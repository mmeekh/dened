<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Weed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        
        #game-container {
            position: relative;
            width: 320px;
            height: 480px;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FF);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }
        
        #game-canvas {
            display: block;
        }
        
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 10;
            text-align: center;
        }
        
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 10;
            text-align: center;
        }
        
        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px 2px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        button:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }
        
        .score {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .game-title {
            font-size: 36px;
            margin-bottom: 20px;
            color: #4CAF50;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        .instruction {
            color: #ffff00;
            font-weight: bold;
            margin: 10px 20px;
            line-height: 1.4;
        }
        
        .score-info {
            margin: 5px 0;
            font-size: 18px;
        }
        
        #toggle-sound {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: transparent;
            font-size: 24px;
            padding: 5px;
            color: white;
            cursor: pointer;
            border: none;
            z-index: 20;
        }
        
        @media (max-height: 480px) {
            #game-container {
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="320" height="480"></canvas>
        <div class="score">0</div>
        <button id="toggle-sound" onclick="game.sound.toggle()">🔊</button>
        
        <div class="start-screen">
            <h1 class="game-title">Flappy Weed</h1>
            <p>Ekrana tıklayarak zıpla, borulardan kaç!</p>
            <p class="instruction">ÖNEMLİ: Sürekli tıklayarak karakteri havada tut!<br>Her 1-2 saniyede bir tıkla!</p>
            <button id="start-button">Oyuna Başla</button>
        </div>
        
        <div class="game-over">
            <h2>Oyun Bitti!</h2>
            <p class="score-info">Skorun: <span id="final-score">0</span></p>
            <p class="score-info">En Yüksek Skorun: <span id="high-score">0</span></p>
            <button id="restart-button">Tekrar Oyna</button>
            <button id="submit-score">Skoru Kaydet</button>
        </div>
    </div>

    <!-- Load game scripts -->
    <script src="Static/Js/sound.js"></script>
    <script src="Static/Js/background.js"></script>
    <script src="Static/Js/pipe.js"></script>
    <script src="Static/Js/weed.js"></script>
    <script src="Static/Js/game.js"></script>
</body>
</html>
