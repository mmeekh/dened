<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base leaf shape -->
  <ellipse cx="50" cy="50" rx="40" ry="30" fill="#44A244" stroke="#2E7D32" stroke-width="2" />
  
  <!-- Leaf details -->
  <path d="M30 50 L70 50" stroke="#2E7D32" stroke-width="3" />
  <path d="M50 30 L50 70" stroke="#2E7D32" stroke-width="3" />
  
  <!-- Leaf serrations -->
  <path d="M10 50 L30 35 L50 50" fill="#388E3C" />
  <path d="M90 50 L70 35 L50 50" fill="#388E3C" />
  
  <!-- Bottom serration -->
  <path d="M30 65 L50 80 L70 65" fill="#388E3C" />
  
  <!-- Highlight -->
  <ellipse cx="35" cy="35" rx="10" ry="8" fill="rgba(255,255,255,0.2)" />
  
  <!-- Eyes -->
  <circle cx="40" cy="45" r="5" fill="white" />
  <circle cx="60" cy="45" r="5" fill="white" />
  <circle cx="40" cy="45" r="2" fill="black" />
  <circle cx="60" cy="45" r="2" fill="black" />
  
  <!-- Smile -->
  <path d="M40 60 Q50 70 60 60" fill="none" stroke="black" stroke-width="2" />
</svg>
